services:

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - observability

  grafana:
    image: grafana/grafana:12.0.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - observability

  loki:
    image: grafana/loki:3.5.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.8.0
    restart: unless-stopped
    ports:
      - "3200:3200"
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ../monitoring/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.0
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ../monitoring/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
     
      test: ["CMD", "otelcol-contrib", "validate-health", "--endpoint=http://localhost:13133"]
      interval: 20s
      timeout: 5s
      retries: 4
      start_period: 15s
    networks:
      - observability
      - default

networks:
  observability:
    name: platform-observability-network
    driver: bridge
  default:
    name: platform-core-network
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data: