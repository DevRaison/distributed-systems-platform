services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --health-enabled=true
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    healthcheck:
      
      test: ["CMD", "sh", "-c", "timeout 5 sh -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  vault:
    image: hashicorp/vault:1.20
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
    cap_add:
      - IPC_LOCK
    healthcheck:
    
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8200/v1/sys/health?sealedcode=200 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  dependency-track:
    image: dependencytrack/apiserver:latest
    restart: unless-stopped
    environment:
      ALPINE_DATABASE_MODE: embedded
    ports:
      - "8082:8080"
    healthcheck:
      
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  dependency-track-frontend:
    image: dependencytrack/frontend:latest
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      API_BASE_URL: http://dependency-track:8080
    depends_on:
      dependency-track:
        condition: service_healthy

  trivy:
    image: aquasec/trivy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - image
      - distributed-backend:latest
    profiles:
      - security

networks:
  default:
    name: platform-core-network
    external: true